name: DevSecOps

on:
  push:
    branches: [main, master, develop]
  pull_request:
  schedule:
    # Weekly dependency audit
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit
      - name: Audit
        run: pip-audit -r requirements.txt --progress-spinner off || true
        # soft-fail first; flip to hard-fail when baseline is clean:
        # pip-audit -r requirements.txt

  static-security:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install -r requirements.txt ruff bandit
      - name: Ruff lint
        run: ruff check backend || true
      - name: Bandit SAST
        run: bandit -r backend -x backend/mcp_servers -ll || true
      - name: Ensure secrets not in tree
        run: |
          set -e
          # Fail if real settings with keys are committed
          if git ls-files | grep -E '(^|/)\.env$|data/settings\.json$|data/mcp_servers\.json$'; then
            echo "Sensitive files are tracked by git!" >&2
            exit 1
          fi
          # Heuristic: block common live key patterns in tracked files
          if git grep -nE 'sk-or-v1-[a-f0-9]{20,}|nvapi-[A-Za-z0-9_-]{20,}|sk-[A-Za-z0-9]{20,}' -- ':!.github/**' ':!FREE_MCP_CATALOG.md' ':!DEPLOY.md' ; then
            echo "Possible secret material found in repository" >&2
            exit 1
          fi
          echo "Secret path checks passed"

  container-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [secret-scan, static-security]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t aurora-ai:ci .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: aurora-ai:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

  smoke-test:
    name: App smoke test
    runs-on: ubuntu-latest
    needs: [static-security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install & boot
        run: |
          pip install -r requirements.txt
          mkdir -p data workspace
          cp data/settings.example.json data/settings.json
          cp data/mcp_servers.example.json data/mcp_servers.json
          export PYTHONPATH=$PWD/backend
          export AURORA_SECURITY_ENABLED=true
          export AURORA_RATE_LIMIT=true
          uvicorn backend.main:app --host 127.0.0.1 --port 8765 &
          sleep 4
          curl -fsS http://127.0.0.1:8765/api/health | tee /tmp/health.json
          curl -fsS http://127.0.0.1:8765/api/security/status | tee /tmp/sec.json
          python - <<'PY'
          import json
          h=json.load(open("/tmp/health.json"))
          s=json.load(open("/tmp/sec.json"))
          assert h.get("ok") is True
          assert s.get("enabled") is True
          print("smoke ok", h.get("version"), s.get("rate_limit"))
          PY
